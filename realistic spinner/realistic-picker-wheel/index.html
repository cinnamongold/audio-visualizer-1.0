<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultrarealistic 3D Picker Wheel</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body { background: #111; display: flex; align-items: center; justify-content: center; }
    #scene-container { width: 90vw; height: 70vh; max-width: 900px; max-height: 600px; }
    canvas { display: block; width: 100%; height: 100%; }
    #hint { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); color: #ddd; font-family: sans-serif; font-size: 12px; background: rgba(0,0,0,.25); padding: 6px 10px; border-radius: 6px; }
  </style>
</head>
<body>
  <div id="scene-container"></div>
  <div id="hint">Drag to spin • Release to continue with inertia</div>
  <!-- Panel for editing wheel items (wired by main.js) -->
  <div id="panel-rt" style="position: absolute; right: 20px; top: 20px; width: 320px; background: rgba(0,0,0,.5); padding: 10px; border-radius: 8px; color: #fff; font-family: sans-serif; font-size: 13px;">
    <div style="font-weight: bold; margin-bottom: 6px;">Wheel Items</div>
    <ul id="items-list" style="list-style: none; padding: 0; max-height: 180px; overflow: auto; margin: 0 0 6px 0;"></ul>
    <div class="item-input" style="display:flex; gap:6px;">
      <input id="new-item" type="text" placeholder="Add item to wheel" style="flex:1; padding:6px;" />
      <button id="add-item" style="padding:6px 8px;">Add</button>
    </div>
    <div class="panel-actions" style="display:flex; gap:6px; margin-top:6px;">
      <button id="update-wheel" class="secondary" style="padding:6px 10px;">Update Wheel</button>
      <button id="reset-defaults" style="padding:6px 10px;">Reset Defaults</button>
    </div>
  </div>
  <script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
  <script>
    // Ultrarealistic 3D Picker Wheel (glossy disc with environment reflections)
    let scene, camera, renderer, wheel, clock;
    let isDragging = false;
    let spinVelocity = 0; // radians per second
    const wheelRadius = 4.0;
    const wheelHeight = 0.6;
    const segments = 8;
    const labels = [];

    // Build labels
    for (let i = 0; i < segments; i++) labels.push(`S${i+1}`);

    function makeWheelTexture(n, labels) {
      const size = 1024;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const cx = size/2, cy = size/2;
      const r = size/2 - 20;
      // Background ring
      const g = ctx.createRadialGradient(cx, cy, r*0.2, cx, cy, r);
      g.addColorStop(0, '#1a1a1a');
      g.addColorStop(1, '#0a0a0a');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
      // Segments
      const colors = ['#e74c3c','#f1c40f','#2ecc71','#3498db','#9b59b6','#e67e22','#1abc9c','#bdc3c7'];
      for (let i = 0; i < n; i++) {
        const a0 = (i / n) * Math.PI * 2;
        const a1 = ((i+1) / n) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, a0, a1);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        // Label
        const amid = (a0 + a1) / 2;
        const tx = cx + Math.cos(amid) * (r * 0.65);
        const ty = cy + Math.sin(amid) * (r * 0.65);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 44px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.save(); ctx.translate(tx, ty); ctx.rotate(amid); ctx.fillText(labels[i], 0, 0); ctx.restore();
      }
      // Center label ring
      ctx.beginPath(); ctx.arc(cx, cy, r*0.2, 0, Math.PI*2); ctx.fillStyle = '#111'; ctx.fill();
      const centerText = 'SpinMe';
      ctx.fillStyle = '#fff'; ctx.font = 'bold 42px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(centerText, cx, cy);
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function init() {
      const container = document.getElementById('scene-container');
      const width = container.clientWidth;
      const height = container.clientHeight;
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
      camera.position.set(0, 6, 12);
      camera.lookAt(0, 0, 0);

      // Lighting with subtle HDR-like feel via ambient + directional
      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);
      const dir = new THREE.DirectionalLight(0xffffff, 0.9);
      dir.position.set(5, 10, 5);
      dir.castShadow = false;
      scene.add(dir);

      // Environment map for reflections (simple cube map from CDN)
      const loader = new THREE.CubeTextureLoader();
      const envMap = loader.load([
        'https://threejs.org/examples/textures/cube/Bridge2/posx.jpg',
        'https://threejs.org/examples/textures/cube/Bridge2/negx.jpg',
        'https://threejs.org/examples/textures/cube/Bridge2/posy.jpg',
        'https://threejs.org/examples/textures/cube/Bridge2/negy.jpg',
        'https://threejs.org/examples/textures/cube/Bridge2/posz.jpg',
        'https://threejs.org/examples/textures/cube/Bridge2/negz.jpg'
      ]);
      envMap.encoding = THREE.sRGBEncoding;
      scene.environment = envMap;

      // Wheel texture (segmented disc with labels)
      const wheelTexture = makeWheelTexture(segments, labels);
      const mat = new THREE.MeshStandardMaterial({ map: wheelTexture, metalness: 0.9, roughness: 0.08, envMap: envMap, side: THREE.DoubleSide });

      // Geometry: a thin disc (cylinder capped) with the wheel texture on its top and sides
      const discGeom = new THREE.CylinderGeometry(wheelRadius, wheelRadius, wheelHeight, 64, 1, true);
      wheel = new THREE.Mesh(discGeom, mat);
      wheel.rotation.x = Math.PI / 2; // lay flat on XZ plane
      scene.add(wheel);

      // Ground for subtle contact shadows (fake soft shadow)
      const plane = new THREE.Mesh(
        new THREE.PlaneGeometry(40, 40),
        new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 1, metalness: 0.0, side: THREE.DoubleSide })
      );
      plane.rotation.x = -Math.PI / 2;
      plane.position.y = -wheelHeight/2 - 0.01;
      plane.receiveShadow = true;
      scene.add(plane);

      // Interaction helpers
      clock = new THREE.Clock();
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(width, height);
      renderer.outputEncoding = THREE.sRGBEncoding;
      container.appendChild(renderer.domElement);

      // Pointer interactions
      const canvas = renderer.domElement;
      canvas.style.touchAction = 'none';
      canvas.addEventListener('pointerdown', (e) => {
        isDragging = true;
        spinVelocity = 0; // reset velocity while dragging
        lastX = e.clientX;
      });
      window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - lastX;
        lastX = e.clientX;
        // Convert horizontal drag into angular velocity around Y axis
        spinVelocity = dx * 0.005; // sensitivity
      });
      window.addEventListener('pointerup', () => { isDragging = false; });
      var lastX = 0;

      window.addEventListener('resize', onWindowResize, false);
      animate();
    }

    function onWindowResize() {
      const container = document.getElementById('scene-container');
      const width = container.clientWidth;
      const height = container.clientHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(0.05, clock.getDelta());
      // Inertia: apply velocity to wheel rotation around Y axis
      if (!isDragging) {
        if (Math.abs(spinVelocity) > 0.0001) {
          wheel.rotation.y += spinVelocity * dt * 60; // convert to deg/sec-ish
          // friction
          spinVelocity *= 0.98;
        } else {
          spinVelocity = 0;
        }
      }
      renderer.render(scene, camera);
    }

    // Create a wheel texture with n segments and provided labels
    function makeWheelTexture(n, labels) {
      const size = 1024;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const cx = size/2, cy = size/2;
      const r = size/2 - 20;
      // subtle radial gradient background
      const g = ctx.createRadialGradient(cx, cy, r*0.1, cx, cy, r);
      g.addColorStop(0, '#2b2b2b');
      g.addColorStop(1, '#141414');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
      const colors = ['#e74c3c','#f1c40f','#2ecc71','#3498db','#9b59b6','#e67e22','#1abc9c','#bdc3c7'];
      for (let i = 0; i < n; i++) {
        const a0 = (i / n) * Math.PI * 2;
        const a1 = ((i+1) / n) * Math.PI * 2;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, a0, a1); ctx.closePath();
        ctx.fillStyle = colors[i % colors.length]; ctx.fill();
        const amid = (a0 + a1) / 2;
        const tx = cx + Math.cos(amid) * (r * 0.65);
        const ty = cy + Math.sin(amid) * (r * 0.65);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.save(); ctx.translate(tx, ty); ctx.rotate(amid); ctx.fillText(labels[i], 0, 0); ctx.restore();
      }
      // center gloss
      ctx.beginPath(); ctx.arc(cx, cy, r*0.18, 0, Math.PI*2); ctx.fillStyle = '#111'; ctx.fill();
      // small center dot for depth cue
      ctx.fillStyle = '#999'; ctx.beginPath(); ctx.arc(cx, cy, r*0.04, 0, Math.PI*2); ctx.fill();
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    // Kickoff
    init();
  </script>
</body>
</html>
