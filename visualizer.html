<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Neon Void VII: SPECTRUM</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            z-index: 10;
            transition: opacity 0.5s;
        }

        h1 {
            color: white;
            font-family: sans-serif;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-style: italic;
            text-shadow: 0 0 20px #ffffff;
        }

        button {
            padding: 15px 40px;
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            margin: 10px;
        }

        button:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px #fff;
        }

        /* Settings Panel */
        #settingsBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 20px;
        }

        #settingsPanel {
            position: absolute;
            top: 60px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 20px;
            border: 1px solid #fff;
            border-radius: 5px;
            font-family: sans-serif;
            min-width: 300px;
            max-width: 400px;
            max-height: 80vh;
            /* Limits height to 80% of viewport */
            overflow-y: auto;
            /* Enables vertical scrolling */
            overflow-x: hidden;
            /* Prevents horizontal scrolling */
            display: none;
            scrollbar-width: thin;
            /* For Firefox */
            scrollbar-color: rgba(255, 255, 255, 0.3) rgba(0, 0, 0, 0.1);
            /* For Firefox */
        }

        #settingsPanel h3 {
            margin-top: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #cursorHider {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 100;
            cursor: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 8px;
            text-align: center;
            font-family: sans-serif;
        }

        #cursorHider:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: (255, 255, 255, 0.8);
            transform: scale(1.1);
        }

        #cursorHider.active {
            background: rgba(255, 0, 0, 0.05);
            border-color: rgba(255, 0, 0, 0.1);
        }

        .setting-group {
            margin-bottom: 15px;
        }

        .setting-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .slider-container {
            display: flex;
            align-items: center;
        }

        .slider-container input {
            flex: 1;
            margin-right: 10px;
        }

        .value-display {
            width: 40px;
            text-align: right;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <div id="overlay">
        <h1>Neon Void VII</h1>
        <button id="startBtn">Initialize Spectrum</button>
    </div>

    <button id="settingsBtn">Settings</button>
    <div id="settingsPanel">
        <h3>Audio Visualization Settings</h3>

        <div class="setting-group">
            <button id="filterFixBtn"
                style="width: 100%; background: rgba(255,0,0,0.2); border-color: #ff4444; color: #ff8888;"
                title="Resets recently cached audio data. Runs automatically during audio low points.">
                FilterFix
            </button>
        </div>

        <div class="setting-group">
            <label>Bass Sensitivity</label>
            <div class="slider-container">
                <input type="range" id="bassSensitivity" min="0.1" max="5" step="0.1" value="1">
                <span class="value-display" id="bassValue">1.0</span>
            </div>
        </div>

        <div class="setting-group">
            <label>Vocal Sensitivity</label>
            <div class="slider-container">
                <input type="range" id="midSensitivity" min="0.1" max="2" step="0.1" value="0.3">
                <span class="value-display" id="midValue">0.3</span>
            </div>
        </div>

        <div class="setting-group">
            <label>High Sensitivity</label>
            <div class="slider-container">
                <input type="range" id="highSensitivity" min="0.1" max="5" step="0.1" value="1">
                <span class="value-display" id="highValue">1.0</span>
            </div>
        </div>

        <div class="setting-group">
            <label>Color Sensitivity</label>
            <div class="slider-container">
                <input type="range" id="colorSensitivity" min="0.1" max="3" step="0.1" value="1">
                <span class="value-display" id="colorValue">1.0</span>
            </div>
        </div>

        <div class="setting-group">
            <label>Sizing Sensitivity</label>
            <div class="slider-container">
                <input type="range" id="sizeSensitivity" min="0.1" max="3" step="0.1" value="1">
                <span class="value-display" id="sizeValue">1.0</span>
            </div>
        </div>

        <div class="setting-group">
            <label>Movement Sensitivity</label>
            <div class="slider-container">
                <input type="range" id="moveSensitivity" min="0.1" max="3" step="0.1" value="1">
                <span class="value-display" id="moveValue">1.0</span>
            </div>
        </div>

        <div class="setting-group">
            <label>FOV Sensitivity</label>
            <div class="slider-container">
                <input type="range" id="fovSensitivity" min="0.1" max="3" step="0.1" value="1">
                <span class="value-display" id="fovValue">1.0</span>
            </div>
        </div>

        <div class="setting-group">
            <label>Climax Sensitivity</label>
            <div class="slider-container">
                <input type="range" id="climaxSensitivity" min="0.1" max="3" step="0.1" value="1">
                <span class="value-display" id="climaxValue">1.0</span>
            </div>
        </div>

        <div class="setting-group">
            <label>Particle Color Threshold</label>
            <div class="slider-container">
                <input type="range" id="colorThreshold" min="0.1" max="1" step="0.05" value="0.6">
                <span class="value-display" id="colorThresholdValue">0.60</span>
            </div>
        </div>

        <div class="setting-group">
            <label>Movement Factor (0=disabled)</label>
            <div class="slider-container">
                <input type="range" id="easingStrength" min="0" max="2" step="0.01" value="0"
                    title="Set to zero to stop movement">
                <span class="value-display" id="easingValue">0</span>
            </div>
        </div>
    </div>

    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Settings object
        const settings = {
            bassSensitivity: 1,
            midSensitivity: 0.3, // Much lower default for vocals
            highSensitivity: 1,
            colorSensitivity: 1,
            sizeSensitivity: 1,
            moveSensitivity: 1,
            fovSensitivity: 1,
            climaxSensitivity: 1,
            colorThreshold: 0.6,
            easingStrength: 0.1
        };

        // Setup settings panel
        document.getElementById('settingsBtn').addEventListener('click', () => {
            const panel = document.getElementById('settingsPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        });

        // Update settings from sliders
        function setupSettings() {
            const sliders = ['bassSensitivity', 'midSensitivity', 'highSensitivity', 'colorSensitivity',
                'sizeSensitivity', 'moveSensitivity', 'fovSensitivity', 'climaxSensitivity', 'colorThreshold', 'easingStrength'];

            sliders.forEach(sliderId => {
                const slider = document.getElementById(sliderId);
                const valueDisplay = document.getElementById(sliderId.replace('Sensitivity', 'Value').replace('Strength', 'Value').replace('Threshold', 'ThresholdValue'));

                // Set initial values from settings
                slider.value = settings[sliderId];
                valueDisplay.textContent = settings[sliderId];

                slider.addEventListener('input', (e) => {
                    settings[sliderId] = parseFloat(e.target.value);
                    valueDisplay.textContent = e.target.value;
                });
            });
        }
        setupSettings();

        function applyFilterFix() {
            if (filterFixCooldown) return;

            console.log("🛠️ Applying FilterFix...");

            // Reset climax detection variables
            climaxIntensity = 0;
            climaxPeak = 0;
            climaxTimer = 0;

            // Reset material uniforms to baseline
            if (material && material.uniforms) {
                material.uniforms.uBass.value = 0;
                material.uniforms.uMids.value = 0;
                material.uniforms.uHighs.value = 0;
                material.uniforms.uClimaxIntensity.value = 0;
            }

            // Reset particle uniforms
            if (pMat && pMat.uniforms) {
                pMat.uniforms.uBass.value = 0;
                pMat.uniforms.uClimaxIntensity.value = 0;
            }

            // Reset camera FOV
            camera.fov = 75;
            camera.updateProjectionMatrix();

            // Reset bloom
            bloomPass.strength = 2.2;

            // Visual feedback
            const btn = document.getElementById('filterFixBtn');
            btn.style.background = 'rgba(0,255,0,0.3)';
            btn.style.borderColor = '#44ff44';
            btn.style.color = '#88ff88';
            btn.textContent = '✓ Fixed!';

            // Cooldown period
            filterFixCooldown = true;
            setTimeout(() => {
                filterFixCooldown = false;
                btn.style.background = 'rgba(255,0,0,0.2)';
                btn.style.borderColor = '#ff4444';
                btn.style.color = '#ff8888';
                btn.innerHTML = '🛠️ FilterFix (Reset Audio Cache)';
            }, 2000);
        }

        document.getElementById('filterFixBtn').addEventListener('click', applyFilterFix);

        // --- 1. SPHERE SHADER (LIQUID METAL) ---
        const vertexShader = `
        uniform float uTime;
        uniform float uBass; 
        uniform float uColorSensitivity;
        uniform float uClimaxIntensity;
        varying vec2 vUv;
        varying float vDisplacement;
        varying vec3 vNormal;

        // Simplex Noise
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
        float snoise(vec3 v) {
            const vec2 C = vec2(1.0/6.0, 1.0/3.0);
            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i  = floor(v + dot(v, C.yyy) );
            vec3 x0 = v - i + dot(i, C.xxx) ;
            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min( g.xyz, l.zxy );
            vec3 i2 = max( g.xyz, l.zxy );
            vec3 x1 = x0 - i1 + C.xxx;
            vec3 x2 = x0 - i2 + C.yyy;
            vec3 x3 = x0 - D.yyy;
            i = mod289(i);
            vec4 p = permute( permute( permute( 
                     i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                   + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                   + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
            float n_ = 0.142857142857;
            vec3  ns = n_ * D.wyz - D.xzx;
            vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_ );
            vec4 x = x_ *ns.x + ns.yyyy;
            vec4 y = y_ *ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);
            vec4 b0 = vec4( x.xy, y.xy );
            vec4 b1 = vec4( x.zw, y.zw );
            vec4 s0 = floor(b0)*2.0 + 1.0;
            vec4 s1 = floor(b1)*2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));
            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
            vec3 p0 = vec3(a0.xy,h.x);
            vec3 p1 = vec3(a0.zw,h.y);
            vec3 p2 = vec3(a1.xy,h.z);
            vec3 p3 = vec3(a1.zw,h.w);
            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
        }

        void main() {
            vUv = uv;
            vNormal = normal;
            
            // Enhanced distortion during climax
            float distortion = uBass * 2.5 + uClimaxIntensity * 2.0;
            float noiseVal = snoise(position * 0.8 + uTime * 1.2);
            vDisplacement = noiseVal;
            
            vec3 newPosition = position + normal * (noiseVal * distortion * 0.4);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
        }
    `;

        const fragmentShader = `
        uniform float uTime;
        uniform float uBass;
        uniform float uMids;
        uniform float uHighs;
        uniform float uColorSensitivity;
        uniform float uClimaxIntensity;
        varying float vDisplacement;
        varying vec3 vNormal;

        void main() {
        // SLOWER, VOCAL-CENTERED color cycling
        float colorSpeed = 0.1 * uColorSensitivity + uMids * 1.0; // Focus on mids/vocals
        vec3 spectrum = 0.5 + 0.5 * cos(uTime * colorSpeed + vec3(0, 2, 4)); 

        // VOCAL-DRIVEN pulsing instead of random flashes
        float vocalPulse = uMids * 2.0;
        vec3 audioPulse = spectrum * vocalPulse * 0.3;
        
        // Remove the random climaxFlash and use smoother transitions
        vec3 baseColor = spectrum * 0.3;
        float spikeIntensity = smoothstep(0.2, 0.7, vDisplacement);
        vec3 highlightColor = spectrum * 0.8 + audioPulse;
        
        // SMOOTHER color mixing
        vec3 color = mix(baseColor, highlightColor, spikeIntensity * 1.2);
        
        vec3 viewDir = vec3(0.0, 0.0, 1.0);
        float fresnel = pow(1.0 - dot(vNormal, viewDir), 2.0);
        
        // Reduced intensity for fresnel
        color += vec3(1.0) * fresnel * (uHighs * 1.0 + uClimaxIntensity * 1.5);

        gl_FragColor = vec4(color, 1.0);
    }
    `;

        // --- 2. PARTICLE SHADER ---
        const particleVertex = `
        uniform float uTime;
        uniform float uBass;
        uniform float uSizeSensitivity;
        uniform float uClimaxIntensity;
        uniform float uAverageVolume; // ensure declared for movement
        uniform float uMovementFactor; // movement factor (default 1)
        varying vec3 vPos;
        varying float vAlpha;

        void main() {
            vPos = position;
            // ADDED: Calculate movement based on average volume and movement factor
            float speed = uMovementFactor + uAverageVolume * 3.0; // Speed multiplier (default 1, up to 4)
            float moveX = sin(uTime * speed + position.x) * 0.12 * uMovementFactor;
            float moveY = cos(uTime * speed * 1.3 + position.y) * 0.12 * uMovementFactor;
            float moveZ = sin(uTime * speed * 0.7 + position.z) * 0.12 * uMovementFactor;
            vec3 newPosition = position + vec3(moveX, moveY, moveZ);
            vec4 mvPosition = modelViewMatrix * vec4(newPosition, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            // MOD: Reduced Size Logic
            gl_PointSize = (0.8 + uBass * 4.0) * (20.0 / -mvPosition.z);
        }
    `;

        const particleFragment = `
        uniform float uTime;
        uniform float uBass;
        uniform float uColorSensitivity;
        uniform float uClimaxIntensity;
        uniform float uIntensityThreshold;
        varying vec3 vPos;

        void main() {
            vec2 cxy = 2.0 * gl_PointCoord - 1.0;
            if (dot(cxy, cxy) > 1.0) discard;

            // RAPID COLOR SWITCHING DURING CLIMAX
            float colorSpeed = 0.5 * uColorSensitivity;
            
            // Normal rainbow colors
            vec3 normalColor = 0.5 + 0.5 * cos(uTime * colorSpeed + vPos.y * 0.05 + vec3(0, 2, 4));
            
            // Rapid switching climax colors - different for each particle based on position
            vec3 climaxColor = 0.5 + 0.5 * cos(uTime * 15.0 + vPos.x * 0.1 + vPos.y * 0.1 + vPos.z * 0.1 + vec3(
                sin(uTime * 12.0 + vPos.x) * 2.0,
                cos(uTime * 14.0 + vPos.y) * 2.0, 
                sin(uTime * 16.0 + vPos.z) * 2.0
            ));
            
            // Special color for intensity threshold
            vec3 thresholdColor = vec3(
                0.8 + 0.2 * sin(uTime * 8.0 + vPos.x),
                0.8 + 0.2 * cos(uTime * 9.0 + vPos.y),
                0.8 + 0.2 * sin(uTime * 10.0 + vPos.z)
            );
            
            // Mix between colors based on intensity
            vec3 color;
            if (uClimaxIntensity > uIntensityThreshold) {
                // When above threshold, use threshold colors
                color = thresholdColor;
            } else {
                // Normal behavior - mix between normal and climax colors
                color = mix(normalColor, climaxColor, uClimaxIntensity);
            }
            
            // Add brightness boost during climax
            float brightness = 1.0 + uBass * 2.0 + uClimaxIntensity * 3.0;

            gl_FragColor = vec4(color * brightness, 0.8 + uClimaxIntensity * 0.2);
        }
    `;

        // --- SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- THE SPHERE ---
        const geometry = new THREE.SphereGeometry(1.5, 128, 128);
        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: {
                uTime: { value: 0 },
                uBass: { value: 0 },
                uMids: { value: 0 },
                uHighs: { value: 0 },
                uColorSensitivity: { value: 1 },
                uClimaxIntensity: { value: 0 }
            }
        });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // --- THE PARTICLES ---
        const pGeo = new THREE.BufferGeometry();
        const pCount = 3000;
        const pPos = new Float32Array(pCount * 3);
        for (let i = 0; i < pCount * 3; i++) {
            pPos[i] = (Math.random() - 0.5) * 80;
        }
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));

        const pMat = new THREE.ShaderMaterial({
            vertexShader: particleVertex,
            fragmentShader: particleFragment,
            uniforms: {
                uTime: { value: 0 },
                uBass: { value: 0 },
                uAverageVolume: { value: 0 },
                uMovementFactor: { value: 1 },
                uSizeSensitivity: { value: 1 },
                uColorSensitivity: { value: 1 },
                uClimaxIntensity: { value: 0 },
                uIntensityThreshold: { value: 0.6 }
            },
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const particles = new THREE.Points(pGeo, pMat);
        // Create a container Group so we can rotate all particles as a single cube
        const particleContainer = new THREE.Group();
        particleContainer.add(particles);
        scene.add(particleContainer);

        // --- POST PROCESSING ---
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 2.2;
        bloomPass.radius = 0.6;
        composer.addPass(bloomPass);

        // -- FILTERFIX FUNCTIONALITY --
        let filterFixCooldown = false;
        let lowVolumeTimer = 0;
        const LOW_VOLUME_THRESHOLD = 0.05; // Adjusted threshold for low volume
        const LOW_VOLUME_DURATION = 3.0; // 5 seconds of low volume before triggering FilterFix

        // --- AUDIO ---
        let analyser, dataArray;
        document.getElementById('startBtn').addEventListener('click', async () => {
            const stream = await navigator.mediaDevices.getDisplayMedia({ audio: true, video: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 512;
            analyser.smoothingTimeConstant = 0.8;
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            stream.getVideoTracks()[0].stop();
            document.getElementById('overlay').style.opacity = 0;
            setTimeout(() => document.getElementById('overlay').remove(), 500);
        });

        // --- LOOP ---
        const clock = new THREE.Clock();

        // --- SMOOTHING (reduce jitter) ---
        const AUDIO_SMOOTHING = 0.08; // 0 = no smoothing, 1 = instant
        let smoothedAverage = 0;
        let smoothedBass = 0;
        let smoothedMids = 0;
        let smoothedHighs = 0;
        let particleRotationX = 0;
        let particleRotationY = 0;
        let particleRotationZ = 0;
        let sphereRotationX = 0;
        let sphereRotationY = 0;
        let sphereRotationZ = 0;

        let climaxIntensity = 0;
        let climaxPeak = 0;
        let climaxTimer = 0;

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            let bass = 0;
            let mids = 0;
            let highs = 0;
            let averageVolume = 0;

            if (analyser) {
                analyser.getByteFrequencyData(dataArray);

                // ADJUSTED FREQUENCY RANGES - vocals are much less sensitive
                // Bass: 0-100 Hz (bins 0-2)
                let bTotal = 0; for (let i = 0; i < 3; i++) bTotal += dataArray[i];

                // Vocals/Mids: 100-2000 Hz (bins 3-23) - REDUCED SENSITIVITY
                let mTotal = 0; for (let i = 3; i < 24; i++) mTotal += dataArray[i];

                // Highs: 4000-12000 Hz (bins 47-140) - focus on instruments, not vocals
                let hTotal = 0; for (let i = 47; i < 141; i++) hTotal += dataArray[i];

                // Calculate average volume across all frequencies
                let total = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    total += dataArray[i];
                }
                averageVolume = (total / dataArray.length) / 255;

                const deltaTime = clock.getDelta();

                if (averageVolume < LOW_VOLUME_THRESHOLD) {
                    lowVolumeTimer += deltaTime;

                    if (lowVolumeTimer > 1.0) {
                        const timeLeft = LOW_VOLUME_DURATION - lowVolumeTimer;
                        const btn = document.getElementById('filterFixBtn');
                        if (timeLeft > 0) {
                            btn.innerHTML = `Auto FilterFix in ${timeLeft.toFixed(1)}s`;
                            btn.style.background = 'rgba(255,165,0,0.3)';
                        }
                    }

                    if (lowVolumeTimer >= LOW_VOLUME_DURATION && !filterFixCooldown) {
                        applyFilterFix();
                        lowVolumeTimer = 0;
                    }
                } else {
                    lowVolumeTimer = 0;

                    if (!filterFixCooldown) {
                        const btn = document.getElementById('filterFixBtn');
                        btn.innerHTML = 'FilterFix (Reset Audio Cache)';
                        btn.style.background = 'rgba(255,0,0,0.2)';
                    }
                }

                // Apply sensitivity settings - vocals are much less sensitive by default
                bass = Math.pow((bTotal / 3) / 255, 3) * 2.5 * settings.bassSensitivity;
                mids = Math.pow((mTotal / 21) / 255, 2) * 1.0 * settings.midSensitivity; // Reduced power and multiplier
                highs = Math.pow((hTotal / 94) / 255, 2) * 3.0 * settings.highSensitivity;

                // --- SMOOTH the raw audio-derived values to reduce jitter ---
                smoothedAverage += (averageVolume - smoothedAverage) * AUDIO_SMOOTHING;
                smoothedBass += (bass - smoothedBass) * AUDIO_SMOOTHING;
                smoothedMids += (mids - smoothedMids) * AUDIO_SMOOTHING;
                smoothedHighs += (highs - smoothedHighs) * AUDIO_SMOOTHING;

                // IMPROVED CLIMAX DETECTION - less sensitive to vocals
                // Focus on very high frequencies (electric guitar, cymbals) and require higher thresholds
                let guitarRange = 0;
                for (let i = 100; i < 180; i++) guitarRange += dataArray[i]; // 8000-14400 Hz
                let normalizedGuitar = (guitarRange / 80) / 255;

                // Require both high frequencies AND high overall volume for climax
                let climaxThreshold = 0.4; // Higher threshold to avoid false triggers
                let newClimaxIntensity = Math.max(0, (normalizedGuitar * averageVolume * 2) - climaxThreshold);
                newClimaxIntensity *= settings.climaxSensitivity;

                // Peak detection for climax moments
                if (newClimaxIntensity > climaxPeak) {
                    climaxPeak = newClimaxIntensity;
                    climaxTimer = 0.8; // Slightly longer climax effect
                } else if (climaxTimer > 0) {
                    climaxTimer -= 0.016; // ~60fps
                    newClimaxIntensity = climaxPeak * (climaxTimer / 0.8);
                } else {
                    climaxPeak = 0;
                }

                climaxIntensity += (newClimaxIntensity - climaxIntensity) * 0.2; // Slower transition

                // === CONTINUOUS ROTATION BASED ON FREQUENCY BANDS ===
                // deltaTime is already declared earlier in this function; reuse it instead of redeclaring

                // Calculate rotation speeds for each axis based on SMOOTHED frequency bands
                // Normalize each band by its typical max so they have similar effect amounts
                const normBass = smoothedBass / 2.5;   // bass expected max ~2.5
                const normMids = smoothedMids / 2.0;   // mids expected max ~2.0
                const normHighs = smoothedHighs / 3.0; // highs expected max ~3.0

                // Shared rotation multiplier (increased overall rotation effect)
                const rotationMultiplier = 3.5 * settings.moveSensitivity;

                // Bass -> X axis, Mids -> Y axis, Highs -> Z axis
                const rotationSpeedX = (0.04 + normBass * rotationMultiplier);
                const rotationSpeedY = (0.04 + normMids * rotationMultiplier);
                const rotationSpeedZ = (0.04 + normHighs * rotationMultiplier);

                // Rotate the whole particle container as a single unit (prevents per-particle jitter)
                if (typeof particleContainer !== 'undefined') {
                    particleContainer.rotation.x += rotationSpeedX * deltaTime;
                    particleContainer.rotation.y += rotationSpeedY * deltaTime;
                    particleContainer.rotation.z += rotationSpeedZ * deltaTime;
                }

                // Add subtle climax wobble to the entire system
                if (climaxIntensity > 0.3) {
                    const wobbleIntensity = climaxIntensity * 0.1;
                    sphere.rotation.x += Math.sin(time * 2.0) * wobbleIntensity;
                    sphere.rotation.z += Math.cos(time * 1.7) * wobbleIntensity;
                }
            }

            // Update Uniforms with settings
            material.uniforms.uTime.value = time;
            // Use smoothed bass/mids/highs for uniform updates to avoid flicker
            material.uniforms.uBass.value += (smoothedBass * 0.7 - material.uniforms.uBass.value) * settings.easingStrength;
            material.uniforms.uMids.value = smoothedMids;
            material.uniforms.uHighs.value = smoothedHighs * 0.8;
            material.uniforms.uColorSensitivity.value = settings.colorSensitivity * 0.8;
            material.uniforms.uClimaxIntensity.value = climaxIntensity * 0.7;

            pMat.uniforms.uTime.value = time;
            pMat.uniforms.uBass.value = smoothedBass;
            pMat.uniforms.uSizeSensitivity.value = settings.sizeSensitivity;
            pMat.uniforms.uColorSensitivity.value = settings.colorSensitivity;
            pMat.uniforms.uClimaxIntensity.value = climaxIntensity;
            pMat.uniforms.uIntensityThreshold.value = settings.colorThreshold;
            pMat.uniforms.uAverageVolume.value = smoothedAverage;
            pMat.uniforms.uMovementFactor.value = settings.moveSensitivity; // default movement factor controlled by settings (default 1)

            // Enhanced FOV during climax
            const targetFOV = 75 + (mids * 80 * settings.fovSensitivity) + (climaxIntensity * 80); // Reduced mids impact
            camera.fov += (targetFOV - camera.fov) * settings.easingStrength;
            camera.updateProjectionMatrix();

            // Enhanced bloom during climax
            bloomPass.strength = 2.2 + climaxIntensity * 3;

            controls.update();
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

        // Cursor hider functionality
        const cursorHider = document.getElementById('cursorHider');
        let cursorHidden = false;

        cursorHider.addEventListener('click', () => {
            cursorHidden = !cursorHidden;

            if (cursorHidden) {
                document.body.style.cursor = 'none';
                cursorHider.classList.add('active');
                cursorHider.innerHTML = 'Show<br>Cursor';
            } else {
                document.body.style.cursor = 'default';
                cursorHider.classList.remove('active');
                cursorHider.innerHTML = 'Hide<br>Cursor';
            }
        });

        // Hide cursor after inactivity
        let cursorTimer;
        function hideCursorAfterInactivity() {
            document.body.style.cursor = 'default';
            clearTimeout(cursorTimer);
            cursorTimer = setTimeout(() => {
                if (!cursorHidden) {
                    document.body.style.cursor = 'none';
                }
            }, 3000); // Hide after 3 seconds of inactivity
        }

        // Reset timer on mouse movement
        document.addEventListener('mousemove', () => {
            if (!cursorHidden) {
                document.body.style.cursor = 'default';
                hideCursorAfterInactivity();
            }
        });

        // Initialize cursor hiding
        hideCursorAfterInactivity();

        // Hotkey for cursor hiding (S key)
        document.addEventListener('keydown', (event) => {
            // Check if 'S' key is pressed and not in an input field
            if (event.key.toLowerCase() === 's' && event.target.tagName !== 'INPUT') {
                // Prevent default behavior (like browser search)
                event.preventDefault();

                // Toggle cursor state
                cursorHidden = !cursorHidden;

                if (cursorHidden) {
                    document.body.style.cursor = 'none';
                    cursorHider.classList.add('active');
                    cursorHider.innerHTML = 'Show<br>Cursor';
                } else {
                    document.body.style.cursor = 'default';
                    cursorHider.classList.remove('active');
                    cursorHider.innerHTML = 'Hide<br>Cursor';
                }

                // Show a brief visual feedback on the hider button
                cursorHider.style.transform = 'scale(1.3)';
                setTimeout(() => {
                    cursorHider.style.transform = 'scale(1)';
                }, 200);
            }

            if (event.key.toLowerCase() === 'f' && event.target.tagName !== 'INPUT') {
                event.preventDefault();
                applyFilterFix();

                // Visual feedback
                const btn = document.getElementById('filterFixBtn');
                btn.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    btn.style.transform = 'scale(1)';
                }, 200);
            }
        });
    </script>

    <div id="cursorHider" title="Click to show/hide cursor">Hide<br>Cursor<br>(Hotkey: S)</div>
</body>
